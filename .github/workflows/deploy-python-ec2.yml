name: Build and Deploy Python GNN Service to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'Python-Backend/**'
      - '.github/workflows/deploy-python-ec2.yml'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: false
        default: 'deploy'
        type: choice
        options:
          - deploy
          - fetch-ec2-info

jobs:
  # ── Standalone job: fetch EC2 info (runs when action=fetch-ec2-info) ──────────
  fetch-ec2-info:
    name: Fetch EC2 Instance Info
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'fetch-ec2-info' }}
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Fetch EC2 Instance Details
        run: |
          echo "========== EC2 Instance State =========="
          aws ec2 describe-instances \
            --instance-ids i-08b39b7c044b5005f \
            --query 'Reservations[0].Instances[0].{State:State.Name,PublicIP:PublicIpAddress,PrivateIP:PrivateIpAddress,Type:InstanceType,AZ:Placement.AvailabilityZone,SG:SecurityGroups[*].GroupId}' \
            --output table

          echo ""
          echo "========== Security Group Rules (port 80) =========="
          SG_ID=$(aws ec2 describe-instances \
            --instance-ids i-08b39b7c044b5005f \
            --query 'Reservations[0].Instances[0].SecurityGroups[0].GroupId' \
            --output text)
          echo "Security Group ID: $SG_ID"
          aws ec2 describe-security-groups \
            --group-ids $SG_ID \
            --query 'SecurityGroups[0].IpPermissions[?FromPort==`80`]' \
            --output table

          echo ""
          echo "========== Public IP =========="
          EC2_IP=$(aws ec2 describe-instances \
            --instance-ids i-08b39b7c044b5005f \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          echo "Current Public IP: $EC2_IP"

  # ── Main deploy job ───────────────────────────────────────────────────────────
  build-and-deploy:
    name: Build Docker Image & Deploy to EC2
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.action == 'deploy' }}

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Docker Buildx ─────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Login to Docker Hub ───────────────────────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── 4. Build & Push image ────────────────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./Python-Backend
          file: ./Python-Backend/Dockerfile
          push: true
          no-cache: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cloud-automation-gnn-python:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/cloud-automation-gnn-python:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/cloud-automation-gnn-python:buildcache,mode=max

      # ── 5. Configure AWS credentials ─────────────────────────────────────────
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # ── 6. Resolve EC2 public IP dynamically ─────────────────────────────────
      - name: Get EC2 Public IP
        id: get-ip
        run: |
          EC2_IP=$(aws ec2 describe-instances \
            --instance-ids i-08b39b7c044b5005f \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          echo "ec2_ip=$EC2_IP" >> $GITHUB_OUTPUT
          echo "Resolved EC2 IP: $EC2_IP"

      # ── 7. SSH into EC2 and deploy container ─────────────────────────────────
      - name: Deploy and restart Docker container on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.get-ip.outputs.ec2_ip }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # ── Install Docker if not present ────────────────────────────────────
            if ! command -v docker &> /dev/null; then
              echo "Docker not found. Installing..."
              sudo apt-get update -y
              sudo apt-get install -y ca-certificates curl gnupg lsb-release
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg
              echo \
                "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
                https://download.docker.com/linux/ubuntu \
                $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update -y
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io
              sudo systemctl start docker
              sudo systemctl enable docker
              # Allow ubuntu user to run docker without sudo
              sudo usermod -aG docker ubuntu
              echo "Docker installed successfully."
            else
              echo "Docker already installed: $(docker --version)"
            fi

            # ── Login to Docker Hub ───────────────────────────────────────────────
            echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # Stop and remove old container (ignore errors if not running)
            sudo docker stop cloud-automation-gnn-python || true
            sudo docker rm cloud-automation-gnn-python || true

            # Free up disk space by removing unused images
            sudo docker image prune -af

            # Pull the latest image
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/cloud-automation-gnn-python:latest

            # Write environment file (overwrites on each deploy)
            cat > ~/.env << 'EOF'
            AWS_REGION=ap-south-1
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            MPLCONFIGDIR=/tmp/matplotlib
            MODEL_BUCKET=cloud-automation-gnn-models-dev
            MODEL_KEY=models/gnn_model.pt
            NODE_BACKEND_URL=https://480itv48ze.execute-api.ap-south-1.amazonaws.com/dev
            DYNAMODB_ANOMALY_TABLE=cloud-automation-gnn-dev-anomalies
            DYNAMODB_LOG_TABLE=cloud-automation-gnn-dev-automation-logs
            SQS_QUEUE_URL=https://sqs.ap-south-1.amazonaws.com/670467382559/cloud-automation-gnn-dev-event-queue
            EOF

            # Run container with env file, restart policy, and port binding
            sudo docker run -d \
              --name cloud-automation-gnn-python \
              --restart unless-stopped \
              -p 8000:8000 \
              --env-file ~/.env \
              ${{ secrets.DOCKER_USERNAME }}/cloud-automation-gnn-python:latest

            # Tail logs briefly to confirm startup
            sleep 5
            sudo docker logs --tail 30 cloud-automation-gnn-python

      # ── 8. Verify health endpoint ─────────────────────────────────────────────
      - name: Verify health endpoint
        run: |
          EC2_IP=${{ steps.get-ip.outputs.ec2_ip }}
          echo "Target IP: $EC2_IP"
          echo "Waiting 60s for model to load..."
          sleep 60

          # Retry up to 5 times with 20s gap
          for i in {1..5}; do
            echo "--- Attempt $i/5 ---"
            HTTP_STATUS=$(curl -sv --connect-timeout 10 -o /tmp/health_response.txt \
              -w "%{http_code}" http://${EC2_IP}/health 2>/tmp/curl_verbose.txt || echo "000")
            echo "HTTP Status: $HTTP_STATUS"
            cat /tmp/health_response.txt 2>/dev/null || true
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Health check passed (HTTP $HTTP_STATUS)"
              exit 0
            elif [ "$HTTP_STATUS" = "000" ]; then
              echo "⚠️  Connection failed (curl exit code 7 - host unreachable)"
              echo "Curl verbose output:"
              cat /tmp/curl_verbose.txt 2>/dev/null || true
            else
              echo "⚠️  HTTP $HTTP_STATUS received"
            fi
            if [ $i -lt 5 ]; then
              echo "Retrying in 20s..."
              sleep 20
            fi
          done

          echo "❌ Health check failed after 5 attempts"
          echo ""
          echo "=== Diagnostics ==="
          echo "Instance ID: i-08b39b7c044b5005f"
          echo "Resolved IP: $EC2_IP"
          echo "Check: EC2 Security Group allows port 80 from 0.0.0.0/0"
          echo "Check: Docker container is running (sudo docker ps -a)"
          exit 1

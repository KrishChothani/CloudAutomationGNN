service: cloud-automation-backend

frameworkVersion: ">=3.0.0 <5.0.0"

useDotenv: true

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-south-1
  stage: ${opt:stage, 'dev'}
  memorySize: 512
  timeout: 29
  logRetentionInDays: 14

  environment:
    MONGODB_URI:            ${env:MONGODB_URI}
    CORS_ORIGIN:            ${env:CORS_ORIGIN, 'http://localhost:5173'}
    ACCESS_TOKEN_SECRET:    ${env:ACCESS_TOKEN_SECRET}
    ACCESS_TOKEN_EXPIRY:    ${env:ACCESS_TOKEN_EXPIRY, '15m'}
    REFRESH_TOKEN_SECRET:   ${env:REFRESH_TOKEN_SECRET}
    REFRESH_TOKEN_EXPIRY:   ${env:REFRESH_TOKEN_EXPIRY, '7d'}
    PYTHON_SERVICE_URL:     ${env:PYTHON_SERVICE_URL, 'http://localhost:8000'}
    SNS_TOPIC_ARN:          ${env:SNS_TOPIC_ARN, ''}
    DYNAMODB_TABLE:         ${env:DYNAMODB_TABLE, 'cloud-automation-gnn-${self:provider.stage}'}
    AWS_REGION_NAME:        ${self:provider.region}
    NODE_ENV:               ${self:provider.stage}

  iam:
    role:
      statements:
        # ── SNS: publish anomaly alerts ──────────────────────────────────────
        - Effect: Allow
          Action:
            - sns:Publish
            - sns:GetTopicAttributes
          Resource:
            - !Sub 'arn:aws:sns:${self:provider.region}:*:cloud-automation-gnn-*'

        # ── DynamoDB: store anomaly results and automation logs ───────────────
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:BatchWriteItem
            - dynamodb:DescribeTable
          Resource:
            - !Sub 'arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.DYNAMODB_TABLE}'
            - !Sub 'arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.DYNAMODB_TABLE}/index/*'

        # ── EventBridge: emit cloud-metric events ────────────────────────────
        - Effect: Allow
          Action:
            - events:PutEvents
            - events:DescribeRule
            - events:ListRules
          Resource:
            - !Sub 'arn:aws:events:${self:provider.region}:*:event-bus/default'
            - !Sub 'arn:aws:events:${self:provider.region}:*:rule/cloud-metrics-rule'

        # ── SQS: consume event queue ──────────────────────────────────────
        - Effect: Allow
          Action:
            - sqs:ReceiveMessage
            - sqs:DeleteMessage
            - sqs:GetQueueAttributes
            - sqs:ChangeMessageVisibility
            - sqs:GetQueueUrl
          Resource:
            - !GetAtt CloudAutomationEventQueue.Arn

        # ── CloudWatch Logs ─────────────────────────────────────────────────
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource: '*'

functions:

  # ── 1. HTTP API handler (all REST routes) ──────────────────────────────────
  app:
    name: cloud-automation-gnn-api-${self:provider.stage}
    handler: lambda.handler
    description: 'CloudAutomationGNN REST API — users, events, anomalies, automation'
    memorySize: 512
    timeout: 29
    events:
      - http:
          path: /
          method: ANY
          cors:
            origin: ${env:CORS_ORIGIN, '*'}
            headers:
              - Content-Type
              - Authorization
            allowCredentials: true
      - http:
          path: /{proxy+}
          method: ANY
          cors:
            origin: ${env:CORS_ORIGIN, '*'}
            headers:
              - Content-Type
              - Authorization
            allowCredentials: true

  # ── 2. EventBridge event processor (GNN metric ingestion) ─────────────────
  eventProcessor:
    name: cloud-automation-gnn-event-processor-${self:provider.stage}
    handler: src/eventProcessor.handler
    description: 'Processes CloudWatch metric events via EventBridge and forwards to GNN service'
    memorySize: 256
    timeout: 60
    events:
      - eventBridge:
          name: cloud-metrics-rule
          description: 'Triggers on cloud infrastructure metric change events'
          eventBus: default
          pattern:
            source:
              - 'cloud-automation.metrics'
              - 'aws.cloudwatch'
            detail-type:
              - 'CloudMetricEvent'
              - 'CloudWatch Alarm State Change'
      # Also triggered by SQS for batch ingestion
      - sqs:
          arn: !GetAtt CloudAutomationEventQueue.Arn
          batchSize: 10
          maximumBatchingWindow: 30
          functionResponseType: ReportBatchItemFailures

plugins:
  - serverless-esbuild
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 5000
    lambdaPort: 5010
    reloadHandler: true

  esbuild:
    bundle: true           # tree-shake & inline all imports
    minify: false          # keep readable for Lambda logs/debugging
    sourcemap: true        # enables proper stack traces in CloudWatch
    target: node20         # matches provider.runtime
    platform: node
    format: esm            # matches "type": "module" in package.json
    outputFileExtension: .mjs
    packager: npm
    exclude:               # already bundled by AWS Lambda runtime
      - '@aws-sdk/*'
    keepOutputDirectory: false



package:
  patterns:
    - '!node_modules/aws-sdk/**'   # AWS SDK is available by default in Lambda
    - '!node_modules/.bin/**'
    - '!node_modules/**/test/**'
    - '!node_modules/**/tests/**'
    - '!node_modules/**/docs/**'
    - '!node_modules/**/.github/**'
    - '!*.test.js'
    - '!*.spec.js'
    - '!*.zip'
    - '!*.log'
    - '!Public/**'
    - '!README.md'
    - '!coverage/**'
    - '!scripts/**'
    - '!docs/**'

resources:
  Resources:

    # Dead-letter queue must be created first (referenced by main queue's RedrivePolicy)
    CloudAutomationEventDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: 'cloud-automation-gnn-event-queue-${self:provider.stage}-dlq'
        MessageRetentionPeriod: 1209600   # 14 days

    # Main event queue consumed by the eventProcessor Lambda
    CloudAutomationEventQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: 'cloud-automation-gnn-event-queue-${self:provider.stage}'
        VisibilityTimeout: 300            # >= Lambda timeout (60 s) * 5
        MessageRetentionPeriod: 86400     # 1 day
        ReceiveMessageWaitTimeSeconds: 20 # long-polling
        RedrivePolicy:
          deadLetterTargetArn: !GetAtt CloudAutomationEventDLQ.Arn
          maxReceiveCount: 3

  Outputs:
    EventQueueUrl:
      Description: URL of the SQS event ingestion queue
      Value: !Ref CloudAutomationEventQueue
    EventQueueArn:
      Description: ARN of the SQS event ingestion queue
      Value: !GetAtt CloudAutomationEventQueue.Arn
    EventDLQArn:
      Description: ARN of the SQS dead-letter queue
      Value: !GetAtt CloudAutomationEventDLQ.Arn
service: cloud-automation-backend

frameworkVersion: ">=3.0.0 <5.0.0"

useDotenv: true

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-south-1
  stage: dev
  memorySize: 512
  timeout: 29
  logRetentionInDays: 14

  environment:
    MONGODB_URI:            ${env:MONGODB_URI}
    CORS_ORIGIN:            ${env:CORS_ORIGIN}
    ACCESS_TOKEN_SECRET:    ${env:ACCESS_TOKEN_SECRET}
    ACCESS_TOKEN_EXPIRY:    ${env:ACCESS_TOKEN_EXPIRY, '15m'}
    REFRESH_TOKEN_SECRET:   ${env:REFRESH_TOKEN_SECRET}
    REFRESH_TOKEN_EXPIRY:   ${env:REFRESH_TOKEN_EXPIRY, '7d'}
    PYTHON_SERVICE_URL:     ${env:PYTHON_SERVICE_URL}
    SNS_TOPIC_ARN:          ${env:SNS_TOPIC_ARN, 'arn:aws:sns:${self:provider.region}:${aws:accountId}:cloud-automation-events-${self:provider.stage}'}
    DYNAMODB_TABLE:         ${env:DYNAMODB_TABLE, 'cloud-automation-gnn-${self:provider.stage}'}
    WS_CONNECTIONS_TABLE:   cloud-automation-ws-connections-${self:provider.stage}
    AWS_REGION_NAME:        ${self:provider.region}
    NODE_ENV:               ${self:provider.stage}
    # Exposing the API Gateway WebSocket URL to Lambdas dynamically
    WS_API_ENDPOINT:
      !Join
        - ''
        - - 'https://'
          - !Ref WebsocketsApi
          - '.execute-api.'
          - ${self:provider.region}
          - '.amazonaws.com/'
          - ${self:provider.stage}

  iam:
    role:
      statements:
        # ── SNS: publish anomaly alerts ──────────────────────────────────────
        - Effect: Allow
          Action:
            - sns:Publish
            - sns:GetTopicAttributes
          Resource:
            - !Sub 'arn:aws:sns:${self:provider.region}:*:cloud-automation-gnn-*'

        # ── DynamoDB: store anomaly results and automation logs ───────────────
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:BatchWriteItem
            - dynamodb:DescribeTable
          Resource:
            - !Sub 'arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.DYNAMODB_TABLE}'
            - !Sub 'arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.DYNAMODB_TABLE}/index/*'
            - !GetAtt WsConnectionsTable.Arn
            - !Join [ '/', [ !GetAtt WsConnectionsTable.Arn, 'index/*' ] ]

        # ── EventBridge: emit cloud-metric events ────────────────────────────
        - Effect: Allow
          Action:
            - events:PutEvents
            - events:DescribeRule
            - events:ListRules
          Resource:
            - !Sub 'arn:aws:events:${self:provider.region}:*:event-bus/default'
            - !Sub 'arn:aws:events:${self:provider.region}:*:rule/cloud-metrics-rule'

        # ── SQS: consume event queue ──────────────────────────────────────
        - Effect: Allow
          Action:
            - sqs:ReceiveMessage
            - sqs:DeleteMessage
            - sqs:GetQueueAttributes
            - sqs:ChangeMessageVisibility
            - sqs:GetQueueUrl
          Resource:
            - arn:aws:sqs:${self:provider.region}:${aws:accountId}:cloud-automation-gnn-${self:provider.stage}-event-queue

        # ── CloudWatch API: Fetch direct alarms (Needed by anomaly controller)
        - Effect: Allow
          Action:
            - cloudwatch:DescribeAlarms
          Resource: '*'

        # ── Execution API: Manage WebSocket connections
        - Effect: Allow
          Action:
            - execute-api:ManageConnections
          Resource:
            - !Sub 'arn:aws:execute-api:${self:provider.region}:${aws:accountId}:*/${self:provider.stage}/POST/@connections/*'

        # ── CloudWatch Logs ─────────────────────────────────────────────────
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource: '*'

functions:

  # ── 1. HTTP API handler (all REST routes) ──────────────────────────────────
  app:
    name: cloud-automation-gnn-api-${self:provider.stage}
    handler: lambda.handler
    description: 'CloudAutomationGNN REST API — users, events, anomalies, automation'
    memorySize: 512
    timeout: 29
    events:
      - http:
          path: /
          method: ANY
          cors:
            origin: ${env:CORS_ORIGIN, '*'}
            headers:
              - Content-Type
              - X-Amz-Date
              - Authorization
              - X-Api-Key
              - X-Amz-Security-Token
              - X-Amz-User-Agent
              - Access-Control-Allow-Origin
              - Access-Control-Allow-Credentials
              - Set-Cookie
              - Cookie
            allowCredentials: true
            methods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
      - http:
          path: /{proxy+}
          method: ANY
          cors:
            origin: ${env:CORS_ORIGIN, '*'}
            headers:
              - Content-Type
              - X-Amz-Date
              - Authorization
              - X-Api-Key
              - X-Amz-Security-Token
              - X-Amz-User-Agent
              - Access-Control-Allow-Origin
              - Access-Control-Allow-Credentials
              - Set-Cookie
              - Cookie
            allowCredentials: true
            methods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS

  # ── 2. EventBridge event processor (GNN metric ingestion) ─────────────────
  eventProcessor:
    name: cloud-automation-gnn-event-processor-${self:provider.stage}
    handler: src/eventProcessor.handler
    description: 'Processes CloudWatch metric events via EventBridge and forwards to GNN service'
    memorySize: 256
    timeout: 60
    events:
      - eventBridge:
          name: cloud-metrics-rule-${self:provider.stage}
          description: 'Triggers on cloud infrastructure metric change events'
          eventBus: default
          pattern:
            source:
              - 'cloud-automation.metrics'
              - 'aws.cloudwatch'
            detail-type:
              - 'CloudMetricEvent'
              - 'CloudWatch Alarm State Change'
      - sqs:
          arn: arn:aws:sqs:${self:provider.region}:${aws:accountId}:cloud-automation-gnn-${self:provider.stage}-event-queue
          batchSize: 10
          maximumBatchingWindow: 30
          functionResponseType: ReportBatchItemFailures

  # ── 3. WebSocket connect ──────────────────────────────────────────────────
  wsConnect:
    handler: src/Handlers/websocketHandlers.connect
    description: 'Stores WebSocket connectionId in DynamoDB'
    events:
      - websocket:
          route: $connect

  # ── 4. WebSocket disconnect ───────────────────────────────────────────────
  wsDisconnect:
    handler: src/Handlers/websocketHandlers.disconnect
    description: 'Removes WebSocket connectionId from DynamoDB'
    events:
      - websocket:
          route: $disconnect

  # ── 5. SNS to WebSocket Subscriber ────────────────────────────────────────
  snsToWebSocket:
    handler: src/Handlers/snsSubscriber.handler
    description: 'Subscribes to SNS and pushes events to all connected WebSocket clients'
    events:
      - sns:
          arn: ${self:provider.environment.SNS_TOPIC_ARN}

plugins:
  - serverless-esbuild
  - serverless-offline


custom:
  serverless-offline:
    httpPort: 5000
    lambdaPort: 5010
    reloadHandler: true

  esbuild:
    bundle: true           # tree-shake & inline all imports
    minify: false          # keep readable for Lambda logs/debugging
    sourcemap: true        # enables proper stack traces in CloudWatch
    target: node20         # matches provider.runtime
    exclude: 
      - 'aws-sdk'
      - '@aws-sdk/client-dynamodb'
      - '@aws-sdk/lib-dynamodb'
      - '@aws-sdk/client-apigatewaymanagementapi'
      - '@aws-sdk/client-cloudwatch'
    external:
      - '@aws-sdk/client-dynamodb'
      - '@aws-sdk/lib-dynamodb'
      - '@aws-sdk/client-apigatewaymanagementapi'
      - '@aws-sdk/client-cloudwatch'
    define:
      'require.resolve': undefined
    platform: node

package:
  patterns:
    - '!node_modules/aws-sdk/**'   # AWS SDK is available by default in Lambda
    - '!node_modules/.bin/**'
    - '!node_modules/**/test/**'
    - '!node_modules/**/tests/**'
    - '!node_modules/**/docs/**'
    - '!node_modules/**/.github/**'
    - '!*.test.js'
    - '!*.spec.js'
    - '!*.zip'
    - '!*.log'
    - '!Public/**'
    - '!README.md'
    - '!coverage/**'
    - '!docs/**'

resources:
  Resources:
    # ── DynamoDB Table for WebSocket Connections ──────────────────────────────
    WsConnectionsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: cloud-automation-ws-connections-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: connectionId
            AttributeType: S
        KeySchema:
          - AttributeName: connectionId
            KeyType: HASH
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

    # --- LEGACY RESOURCES START ---
    CloudAutomationSnsTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: cloud-automation-events-${self:provider.stage}

    GnnDataTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: cloud-automation-gnn-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: partitionKey
            AttributeType: S
          - AttributeName: sortKey
            AttributeType: S
        KeySchema:
          - AttributeName: partitionKey
            KeyType: HASH
          - AttributeName: sortKey
            KeyType: RANGE

    EventQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: cloud-automation-gnn-${self:provider.stage}-event-queue
        VisibilityTimeout: 90
        MessageRetentionPeriod: 86400
